<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EMA Admin - Users</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: #f8f9fa;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .sidebar {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            min-height: 100vh;
            padding: 20px;
            position: fixed;
            width: 250px;
            left: 0;
            top: 0;
        }
        .sidebar h3 {
            margin-bottom: 30px;
            text-align: center;
            font-weight: 700;
        }
        .sidebar a {
            display: block;
            color: white;
            padding: 12px 15px;
            margin-bottom: 10px;
            border-radius: 5px;
            text-decoration: none;
            transition: background 0.3s;
        }
        .sidebar a:hover, .sidebar a.active {
            background: rgba(255, 255, 255, 0.2);
        }
        .main-content {
            margin-left: 250px;
            padding: 30px;
        }
        .topbar {
            background: white;
            padding: 15px 20px;
            border-radius: 5px;
            margin-bottom: 30px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .table-container {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .status-badge {
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }
        .status-online {
            background: #d4edda;
            color: #155724;
        }
        .status-offline {
            background: #f8d7da;
            color: #721c24;
        }
        .btn-delete {
            background: #dc3545;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 3px;
            cursor: pointer;
            font-size: 12px;
        }
        .btn-delete:hover {
            background: #c82333;
        }
        .search-box {
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <h3>🔐 EMA Admin</h3>
        <a href="/admin/"><i class="fas fa-chart-line"></i> Dashboard</a>
        <a href="/admin/users" class="active"><i class="fas fa-users"></i> Users</a>
        <a href="/admin/messages"><i class="fas fa-envelope"></i> Messages</a>
        <a href="/admin/requests"><i class="fas fa-handshake"></i> Friend Requests</a>
        <hr style="background: white; margin: 20px 0;">
        <button class="btn btn-logout w-100" style="background: #dc3545; color: white;" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</button>
    </div>

    <div class="main-content">
        <div class="topbar">
            <h2>👥 Users Management</h2>
        </div>

        <div class="table-container">
            <div class="search-box">
                <input type="text" id="searchInput" class="form-control" placeholder="Search by username...">
            </div>
            
            <table class="table table-sm table-hover">
                <thead>
                    <tr>
                        <th>Username</th>
                        <th>Friend Code</th>
                        <th>Status</th>
                        <th>Created</th>
                        <th>Last Seen</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="usersTable">
                    <tr><td colspan="6" class="text-center text-muted">Loading...</td></tr>
                </tbody>
            </table>
            
            <nav>
                <ul class="pagination" id="pagination"></ul>
            </nav>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        let currentPage = 1;
        let currentSearch = '';

        async function loadUsers(page = 1, search = '') {
            try {
                const response = await fetch(`/admin/api/users?page=${page}&search=${search}`);
                const data = await response.json();
                
                const table = document.getElementById('usersTable');
                table.innerHTML = '';
                
                if (data.data.length === 0) {
                    table.innerHTML = '<tr><td colspan="6" class="text-center text-muted">No users found</td></tr>';
                    return;
                }
                
                data.data.forEach(user => {
                    const row = `
                        <tr>
                            <td>${user.username}</td>
                            <td><code>${user.friend_code}</code></td>
                            <td><span class="status-badge ${user.is_online ? 'status-online' : 'status-offline'}">
                                ${user.is_online ? '🟢 Online' : '🔴 Offline'}</span></td>
                            <td>${new Date(user.created_at).toLocaleDateString()}</td>
                            <td>${new Date(user.last_seen).toLocaleTimeString()}</td>
                            <td>
                                <button class="btn-delete" onclick="deleteUser('${user.id}')">Delete</button>
                            </td>
                        </tr>
                    `;
                    table.innerHTML += row;
                });
                
                // Pagination
                const pagination = document.getElementById('pagination');
                pagination.innerHTML = '';
                for (let i = 1; i <= data.pages; i++) {
                    const li = `
                        <li class="page-item ${i === page ? 'active' : ''}">
                            <a class="page-link" href="#" onclick="loadUsers(${i}, '${currentSearch}')">${i}</a>
                        </li>
                    `;
                    pagination.innerHTML += li;
                }
            } catch (error) {
                console.error('Error:', error);
            }
        }

        async function deleteUser(userId) {
            if (!confirm('Are you sure you want to delete this user? This action cannot be undone.')) return;
            
            try {
                const response = await fetch(`/admin/api/users/${userId}/delete`, {method: 'POST'});
                if (response.ok) {
                    alert('User deleted successfully');
                    loadUsers(currentPage, currentSearch);
                } else {
                    alert('Failed to delete user');
                }
            } catch (error) {
                alert('Error deleting user');
            }
        }

        function logout() {
            fetch('/admin/logout', {method: 'POST'}).then(() => {
                window.location.href = '/admin/login';
            });
        }

        document.getElementById('searchInput').addEventListener('keyup', (e) => {
            currentSearch = e.target.value;
            currentPage = 1;
            loadUsers(1, currentSearch);
        });

        loadUsers(1);
    </script>
</body>
</html>
