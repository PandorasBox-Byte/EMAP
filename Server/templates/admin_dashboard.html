<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EMA Admin Dashboard</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: #f8f9fa;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .sidebar {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            min-height: 100vh;
            padding: 20px;
            position: fixed;
            width: 250px;
            left: 0;
            top: 0;
        }
        .sidebar h3 {
            margin-bottom: 30px;
            text-align: center;
            font-weight: 700;
        }
        .sidebar a {
            display: block;
            color: white;
            padding: 12px 15px;
            margin-bottom: 10px;
            border-radius: 5px;
            text-decoration: none;
            transition: background 0.3s;
        }
        .sidebar a:hover, .sidebar a.active {
            background: rgba(255, 255, 255, 0.2);
        }
        .main-content {
            margin-left: 250px;
            padding: 30px;
        }
        .topbar {
            background: white;
            padding: 15px 20px;
            border-radius: 5px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .stat-card {
            background: white;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }
        .stat-card h4 {
            color: #666;
            font-size: 13px;
            margin-bottom: 10px;
            text-transform: uppercase;
        }
        .stat-card .number {
            font-size: 32px;
            font-weight: 700;
            color: #667eea;
        }
        .table-container {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .btn-logout {
            background: #dc3545;
            color: white;
            transition: background 0.3s;
        }
        .btn-logout:hover {
            background: #c82333;
            color: white;
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <h3>🔐 EMA Admin</h3>
        <a href="/admin/" class="active"><i class="fas fa-chart-line"></i> Dashboard</a>
        <a href="/admin/users"><i class="fas fa-users"></i> Users</a>
        <a href="/admin/messages"><i class="fas fa-envelope"></i> Messages</a>
        <a href="/admin/requests"><i class="fas fa-handshake"></i> Friend Requests</a>
        <hr style="background: white; margin: 20px 0;">
        <button class="btn btn-logout w-100" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</button>
    </div>

    <div class="main-content">
        <div class="topbar">
            <h2>📊 Dashboard</h2>
            <div>
                <span style="color: #666; margin-right: 20px;"><i class="fas fa-clock"></i> <span id="currentTime"></span></span>
            </div>
        </div>

        <div class="row">
            <div class="col-md-3">
                <div class="stat-card">
                    <h4>Total Users</h4>
                    <div class="number" id="totalUsers">-</div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="stat-card">
                    <h4>Online Users</h4>
                    <div class="number" id="onlineUsers">-</div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="stat-card">
                    <h4>Total Messages</h4>
                    <div class="number" id="totalMessages">-</div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="stat-card">
                    <h4>Undelivered</h4>
                    <div class="number" id="undeliveredMessages">-</div>
                </div>
            </div>
        </div>

        <div class="table-container">
            <h4><i class="fas fa-inbox"></i> Recent Messages</h4>
            <table class="table table-sm table-hover">
                <thead>
                    <tr>
                        <th>From</th>
                        <th>To</th>
                        <th>Time</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody id="recentMessagesTable">
                    <tr><td colspan="4" class="text-center text-muted">Loading...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        async function loadStats() {
            try {
                const response = await fetch('/admin/api/stats');
                const data = await response.json();
                document.getElementById('totalUsers').textContent = data.total_users;
                document.getElementById('onlineUsers').textContent = data.online_users;
                document.getElementById('totalMessages').textContent = data.total_messages;
                document.getElementById('undeliveredMessages').textContent = data.undelivered_messages;
            } catch (error) {
                console.error('Error loading stats:', error);
            }
        }

        function logout() {
            fetch('/admin/logout', {method: 'POST'}).then(() => {
                window.location.href = '/admin/login';
            });
        }

        function updateTime() {
            const now = new Date();
            document.getElementById('currentTime').textContent = now.toLocaleTimeString();
        }

        loadStats();
        updateTime();
        setInterval(updateTime, 1000);
        setInterval(loadStats, 5000);
    </script>
</body>
</html>
